name: 🐛 fennflow Bug
description: Report a bug or unexpected behavior in fennflow
labels: ["bug"]
assignees: ["Alex-FIR-IT"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing to fennflow! ✊

        Please provide as much information as possible to help us reproduce and fix your issue quickly.

  - type: checkboxes
    id: checks
    attributes:
      label: Initial Checks
      description: Just making sure we're on the same page.
      options:
        - label: I'm using the [latest version](https://github.com/Alex-FIR-IT/fennflow/releases/latest) of fennflow
          required: true
        - label: I've searched for my issue in [the issue tracker](https://github.com/Alex-FIR-IT/fennflow/issues) before opening this issue
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        Please explain what you're seeing and what you would expect to see.

        - **A line of code is worth a thousand words**: you can include minimal, reproducible example code below.
    validations:
      required: true

  - type: textarea
    id: stacktrace
    attributes:
      label: Stacktrace
      description: |
        Please provide the full stacktrace of any error you're encountering.
    validations:
      required: false

  - type: textarea
    id: example
    attributes:
      label: Minimal, Reproducible Example
      description: >
        If at all possible, please add a self-contained,
        [minimal, reproducible example](https://stackoverflow.com/help/minimal-reproducible-example)
        that demonstrates the bug.

        (This will be automatically formatted as code, so no need for backticks.)

      placeholder: |
        from fennflow import ...

        ...
      render: Python

  - type: textarea
    id: version
    attributes:
      label: Python, fennflow & packages that used by fennflow version
      description: |
        Which version of Python, fennflow, and packages that used by fennflow are you using?
      value: |
        - Python:
        - fennflow:
        - aiobotocore: 
        - pydantic:
    validations:
      required: true